# Native Plugin Build Verification
#
# Validates that the libdivecomputer_plugin builds on all platforms
# and that C wrapper unit tests pass.

name: Native Plugin Tests

on:
  push:
    paths:
      - 'packages/libdivecomputer_plugin/**'
      - '.github/workflows/native-plugin-tests.yml'
  pull_request:
    paths:
      - 'packages/libdivecomputer_plugin/**'
      - '.github/workflows/native-plugin-tests.yml'

permissions:
  contents: read

concurrency:
  group: native-plugin-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION_FILE: '.github/flutter-version.txt'

jobs:
  # ==========================================================================
  # C Wrapper Unit Tests (platform-independent)
  # ==========================================================================
  c-wrapper-tests:
    name: C Wrapper Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build and run C wrapper tests
        run: |
          cd packages/libdivecomputer_plugin
          cmake -B build/test test/native
          cmake --build build/test
          ctest --test-dir build/test --output-on-failure

  # ==========================================================================
  # Darwin Swift Unit Tests (PacketReadBuffer, BleCharacteristicSelector)
  # ==========================================================================
  darwin-swift-tests:
    name: Darwin Swift Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run Darwin native Swift tests
        run: bash packages/libdivecomputer_plugin/darwin/run_native_tests.sh

  # ==========================================================================
  # macOS Build
  # ==========================================================================
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(cat $FLUTTER_VERSION_FILE)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS debug (no codesign)
        run: |
          flutter build macos --config-only --debug
          xcodebuild build \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  # ==========================================================================
  # iOS Build
  # ==========================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(cat $FLUTTER_VERSION_FILE)" >> "$GITHUB_OUTPUT"

      # device_info_plus 12.4.0 calls [NSProcessInfo isiOSAppOnVision], a
      # selector that only exists in the iOS 26.1 SDK. The runner's default
      # Xcode lacks it, so the iOS compile fails. Pin Xcode 26 to match the
      # release workflow (whose iOS build compiles device_info_plus fine).
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}

      # This project builds with CocoaPods, not Swift Package Manager. Flutter
      # 3.44 enables SPM by default; keep CI on CocoaPods to match ci.yaml and
      # the release workflow.
      - name: Disable Swift Package Manager (project uses CocoaPods)
        run: flutter config --no-enable-swift-package-manager

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS simulator debug
        run: flutter build ios --simulator --debug --no-codesign

  # ==========================================================================
  # Windows Build
  # ==========================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: echo "version=$(cat $FLUTTER_VERSION_FILE)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows debug
        run: flutter build windows --debug

  # ==========================================================================
  # Linux Build
  # ==========================================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Read Flutter version
        id: flutter-version
        run: echo "version=$(cat $FLUTTER_VERSION_FILE)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}

      - name: Install Linux dependencies
        # libwebkit2gtk-4.1-dev: required since flutter_web_auth_2 pulled in
        # desktop_webview_window, whose Linux plugin links webkit2gtk (4.1 on
        # Ubuntu 24.04; its CMake falls back to the 4.0 name only on older
        # distros). Matches the ci.yaml build-linux dependency list.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libwebkit2gtk-4.1-dev

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux debug
        run: flutter build linux --debug
