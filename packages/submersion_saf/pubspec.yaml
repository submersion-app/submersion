name: submersion_saf
description: Android Storage Access Framework helpers (persisted tree URIs, DocumentFile writes) for Submersion backups.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: app.submersion.saf
        pluginClass: SubmersionSafPlugin
