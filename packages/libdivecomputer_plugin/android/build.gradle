group = "com.submersion.libdivecomputer"
version = "0.1.0"

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22")
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    namespace = "com.submersion.libdivecomputer"
    compileSdk = 34

    // AIDL for the :dc download-service IPC contract (issue #318).
    buildFeatures {
        aidl true
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        minSdk = 21
        // Without an explicit targetSdk, AGP targets the androidTest APK at
        // minSdk (21). Anything below 23 runs in permission review mode, where
        // the system refuses to start a component until the user dismisses a
        // permission-review dialog -- this manifest declares dangerous
        // permissions (ACCESS_FINE_LOCATION, BLUETOOTH_CONNECT). That made
        // DownloadIsolationTest's bindService return true while the :dc process
        // was never created, so the test timed out waiting for a crash that
        // could not happen. Does not affect consumers: the host app sets its own
        // targetSdk.
        targetSdk = 34
        consumerProguardFiles "consumer-rules.pro"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared"
            }
        }

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        androidTest.java.srcDirs += "src/androidTest/kotlin"
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"
    // Compile-time annotations used by the vendored usb-serial-for-android
    // sources (android/third_party/usb-serial-for-android). Annotations-only
    // artifact; no runtime footprint of consequence.
    implementation "androidx.annotation:annotation:1.9.1"

    // Instrumented tests for the :dc IPC (marshaling round-trip, crash isolation).
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "androidx.test:runner:1.5.2"
    androidTestImplementation "androidx.test:core:1.5.0"
}
