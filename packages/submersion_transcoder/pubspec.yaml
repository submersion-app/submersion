name: submersion_transcoder
description: Video transcoding engines for Submersion's adjustable upload quality.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SubmersionTranscoderPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: SubmersionTranscoderPlugin
        sharedDarwinSource: true
      android:
        package: app.submersion.transcoder
        pluginClass: SubmersionTranscoderPlugin
      windows:
        pluginClass: SubmersionTranscoderPluginCApi
