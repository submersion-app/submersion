name: submersion
description: An open-source dive logging application for scuba divers.
publish_to: 'none'
version: 1.5.9+113

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  riverpod: ^3.1.0

  # Database
  drift: ^2.30.0
  sqlite3: ^2.9.4
  # Pinned to 0.5.x on purpose. 0.6.0+eol is an empty tombstone release that
  # removes the Android/desktop scripts which bundle libsqlite3.so into the app.
  # It is only safe once we migrate to sqlite3 3.x (which bundles the lib itself).
  # While we remain on sqlite3 2.x, 0.6.0 drops libsqlite3.so from the Android
  # APK and the app fails to open the DB at startup (issue #433). Do not bump to
  # 0.6.x without completing the sqlite3 v3 migration (UPGRADING_TO_V3.md).
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  path: ^1.9.0

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^17.0.1

  # UI Components
  fl_chart: ^1.1.1
  flutter_map: ^8.2.2
  flutter_map_marker_cluster: ^8.2.2
  flutter_map_marker_popup: ^8.1.0
  flutter_map_tile_caching: ^10.1.1  # Offline map tile caching
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  photo_view: ^0.15.0
  video_player: ^2.10.1

  # Networking
  http: ^1.2.2
  # FFI for reading the Windows certificate store (TLS trust on Windows).
  ffi: ^2.1.0

  # Cloud Storage
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  googleapis_auth: ^2.0.0

  # Platform Integration
  libdivecomputer_plugin:
    path: packages/libdivecomputer_plugin
  submersion_saf:
    path: packages/submersion_saf
  submersion_ocr:
    path: packages/submersion_ocr
  permission_handler: ^12.0.1
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  share_plus: ^12.0.1
  desktop_drop: ^0.7.0
  # Pinned <1.9.0: 1.9.0 is Swift Package Manager-only and drops CocoaPods
  # support, which breaks the iOS/macOS build (this project uses CocoaPods).
  receive_sharing_intent: ">=1.8.1 <1.9.0"
  url_launcher: ^6.3.1
  flutter_contacts: ^2.0.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  photo_manager: ^3.6.0
  native_exif: ^0.8.0
  health: ^13.3.0  # Cross-platform health data (HealthKit, Health Connect)

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # PDF/Printing
  printing: ^5.14.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.0
  xml: ^6.5.0
  clock: ^1.1.2  # zone-aware now() so tests can drive time via fake_async
  pdf: ^3.11.1
  csv: ^6.0.0
  excel: ^4.0.6
  fit_tool: ^1.0.5  # Garmin FIT file parsing for dive imports
  logger: ^2.0.0  # Used to suppress fit_tool's verbose warnings
  collection: ^1.18.0
  equatable: ^2.0.7
  crypto: ^3.0.3
  gal: ^2.3.2

  # Auto-Update
  auto_updater: ^1.0.0
  package_info_plus: ^9.0.1

  # Notifications
  flutter_local_notifications: ^22.0.1
  workmanager: ^0.9.0+3
  timezone: ^0.11.0
  google_fonts: ^8.0.2
  linked_scroll_controller: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  cross_file: ^0.3.5
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.10.4
  drift_dev: ^2.30.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^4.0.0+1
  mockito: ^5.6.1
  plugin_platform_interface: ^2.1.8
  fake_async: ^1.3.3  # synthetic clock + Timer driving for unit tests

dependency_overrides:
  # fit_tool (3 years unmaintained) has stale deps; overrides are safe because:
  # - csv: fit_tool uses csv for optional CSV export, not core FIT binary parsing
  # - logger: fit_tool uses basic logging; logger 2.x is backward-compatible
  csv: ^6.0.0
  logger: ^2.0.0
  # Vendored with threading fix for #83 — WinSparkle callbacks were calling
  # event_sink_->Success() from background threads, violating Flutter's
  # platform channel threading requirement.
  auto_updater_windows:
    path: packages/auto_updater_windows

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/tide/
    - assets/icon/

  shaders:
    - shaders/heatmap.frag

  # Vendored Material Design Icons font (replaces material_design_icons_flutter,
  # which extends the now-sealed IconData and breaks on Flutter 3.44+).
  # Glyphs are referenced via lib/core/icons/mdi_icons.dart.
  fonts:
    - family: Material Design Icons
      fonts:
        - asset: assets/fonts/materialdesignicons-webfont.ttf
